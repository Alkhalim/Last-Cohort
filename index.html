<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Last Cohort</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="game">
    <!-- Title Screen -->
    <div id="title-screen" class="screen active">
      <div class="title-content">
        <h1>LAST COHORT</h1>
        <p class="subtitle">Teutoburg Forest, 9 AD</p>
        <button id="btn-start" class="btn-primary">Begin March</button>
      </div>
    </div>

    <!-- Combat Screen -->
    <div id="combat-screen" class="screen">
      <!-- Morale Bar -->
      <div id="morale-bar">
        <div id="morale-label">STEADY</div>
        <div id="morale-track"><div id="morale-fill"></div></div>
        <button id="btn-log-toggle" class="log-toggle-btn">Log</button>
      </div>

      <!-- Combat Log overlay (collapsed by default) -->
      <div id="combat-log">
        <div id="log-content"></div>
      </div>

      <!-- Enemy Area -->
      <div id="enemy-area">
        <div id="enemy-row-back" class="enemy-row">
          <div class="row-label">Back</div>
          <div class="enemy-slots"></div>
        </div>
        <div id="enemy-row-front" class="enemy-row">
          <div class="row-label">Front</div>
          <div class="enemy-slots"></div>
        </div>
      </div>

      <!-- Dice Pool -->
      <div id="dice-area">
        <div id="phase-label">ROLL PHASE</div>
        <div id="dice-pool"></div>
        <div id="dice-actions">
          <button id="btn-roll" class="btn-primary">Roll Dice</button>
        </div>
      </div>

      <!-- Party + Skills (bottom section) -->
      <div id="bottom-section">
        <div id="party-area"></div>
        <div id="skill-panel" class="hidden">
          <div id="skill-panel-header">
            <span id="skill-unit-name"></span>
          </div>
          <div id="skill-list"></div>
          <div id="btn-confirm" class="hidden"></div>
        </div>
        <button id="btn-end-turn" class="btn-end-turn hidden">End Turn</button>
      </div>
    </div>

    <!-- Encounter Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-content">
        <h2 id="result-title"></h2>
        <p id="result-text"></p>
        <div id="result-party-status"></div>
        <button id="btn-next" class="btn-primary">Continue March</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
