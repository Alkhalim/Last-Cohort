name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Convert assets
        run: |
          cd assets
          for f in *.mp3; do
            if [ -f "$f" ]; then
              ffmpeg -i "$f" -acodec libvorbis "${f%.mp3}.ogg"
              rm "$f"
            fi
          done

      - name: Update file references
        run: |
          find . -type f \( -name "*.html" -name "*.js" \) -exec sed -i 's/\.mp3/.ogg/g' {} +

      - id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4